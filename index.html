<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>FixAR 3D - Mittaustyökalu</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
      /* Yksinkertainen käyttöliittymä, joka kelluu kamerakuvan päällä */
      #ui-container {
        position: absolute;
        bottom: 10%;
        width: 100%;
        text-align: center;
        z-index: 10;
        pointer-events: none; /* Estää UI:ta blokkaamasta ruudun painalluksia */
      }
      #distance-text {
        background-color: rgba(0, 0, 0, 0.7);
        color: #00FF00;
        font-family: sans-serif;
        font-size: 24px;
        padding: 15px 25px;
        border-radius: 30px;
        display: inline-block;
        border: 2px solid #00FF00;
      }
    </style>
  </head>
  <body>
    <div id="ui-container">
      <div id="distance-text">Napauta ruutua (0/2 pistettä)</div>
    </div>

    <script>
      AFRAME.registerComponent('ar-measurement', {
        init: function () {
          this.points = []; // Tallentaa napautettujen pisteiden koordinaatit
          this.uiText = document.getElementById('distance-text');
          
          // Kuunnellaan ruudun napautuksia
          window.addEventListener('click', (e) => {
            // Haetaan kameran (tai puhelimen) sijainti 3D-tilassa
            let camera = document.querySelector('[camera]').object3D;
            
            // Luodaan uusi piste hieman kameran eteen (yksinkertaistettu malli)
            // Oikeassa tuotantoversiossa tähän kytkettäisiin WebXR Hit Test (pintojen tunnistus)
            let position = new THREE.Vector3();
            camera.getWorldDirection(position);
            position.multiplyScalar(-1); // Työnnetään pistettä 1 metri eteenpäin
            position.add(camera.position);

            this.addMarker(position);
          });
        },

        addMarker: function (position) {
          if (this.points.length >= 2) {
            // Nollataan, jos 2 pistettä on jo asetettu
            this.points = [];
            // Poistetaan vanhat pallot ruudulta
            document.querySelectorAll('.marker').forEach(e => e.remove());
            this.uiText.innerText = "Napauta ruutua (1/2 pistettä)";
          }

          this.points.push(position);

          // Luodaan punainen pallo napautettuun kohtaan
          let sphere = document.createElement('a-sphere');
          sphere.setAttribute('radius', '0.02');
          sphere.setAttribute('color', 'red');
          sphere.setAttribute('position', position);
          sphere.setAttribute('class', 'marker');
          this.el.sceneEl.appendChild(sphere);

          if (this.points.length === 1) {
            this.uiText.innerText = "Aseta toinen piste...";
          } else if (this.points.length === 2) {
            this.calculateDistance();
          }
        },

        calculateDistance: function () {
          let p1 = this.points[0];
          let p2 = this.points[1];
          
          // Lasketaan etäisyys (etäisyys on metreinä)
          let distance = p1.distanceTo(p2);
          
          // Muutetaan millimetreiksi
          let distanceMm = Math.round(distance * 1000);
          this.uiText.innerText = `Etäisyys: ${distanceMm} mm`;
        }
      });
    </script>

    <a-scene webxr="requiredFeatures: hit-test, local-floor" ar-measurement>
      <a-camera position="0 1.6 0">
        <a-cursor color="yellow" scale="0.5 0.5 0.5"></a-cursor>
      </a-camera>
    </a-scene>
  </body>
</html>
