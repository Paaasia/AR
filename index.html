<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>FixAR 3D - Mittaustyökalu</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
      #ui-container {
        position: absolute;
        bottom: 10%;
        width: 100%;
        text-align: center;
        z-index: 10;
        pointer-events: none;
      }
      #distance-text {
        background-color: rgba(0, 0, 0, 0.7);
        color: #00FF00;
        font-family: sans-serif;
        font-size: 24px;
        padding: 15px 25px;
        border-radius: 30px;
        display: inline-block;
        border: 2px solid #00FF00;
      }
    </style>
  </head>
  <body>
    <div id="ui-container">
      <div id="distance-text">Napauta ruutua (0/2 pistettä)</div>
    </div>

    <script>
      AFRAME.registerComponent('ar-measurement', {
        init: function () {
          this.points = [];
          this.uiText = document.getElementById('distance-text');
          
          // Luodaan funktio, joka ajetaan kun ruutua napautetaan
          this.handleTap = () => {
            let camera = document.querySelector('[camera]').object3D;
            let position = new THREE.Vector3();
            
            // Haetaan suunta johon puhelin katsoo
            camera.getWorldDirection(position);
            
            // Asetetaan piste 0.5 metrin päähän kamerasta
            position.multiplyScalar(-0.5); 
            position.add(camera.position);

            this.addMarker(position);
          };

          // 1. Kuunnellaan klikkauksia tietokoneen selaimessa (testausta varten)
          window.addEventListener('click', this.handleTap);
          window.addEventListener('touchstart', this.handleTap);

          // 2. TÄRKEIN: Kuunnellaan AR-tilan napautuksia
          this.el.sceneEl.addEventListener('enter-vr', () => {
            if (this.el.sceneEl.is('ar-mode')) {
              // Haetaan aktiivinen AR-sessio ja kuunnellaan 'select' (napautus) tapahtumaa
              const session = this.el.sceneEl.renderer.xr.getSession();
              session.addEventListener('select', this.handleTap);
            }
          });
        },

        addMarker: function (position) {
          if (this.points.length >= 2) {
            this.points = [];
            document.querySelectorAll('.marker').forEach(e => e.remove());
            this.uiText.innerText = "Napauta ruutua (1/2 pistettä)";
          }

          this.points.push(position);

          let sphere = document.createElement('a-sphere');
          sphere.setAttribute('radius', '0.015'); // Hieman pienempi pallo
          sphere.setAttribute('color', 'red');
          sphere.setAttribute('position', position);
          sphere.setAttribute('class', 'marker');
          this.el.sceneEl.appendChild(sphere);

          if (this.points.length === 1) {
            this.uiText.innerText = "Aseta toinen piste...";
          } else if (this.points.length === 2) {
            this.calculateDistance();
          }
        },

        calculateDistance: function () {
          let p1 = this.points[0];
          let p2 = this.points[1];
          let distance = p1.distanceTo(p2);
          let distanceMm = Math.round(distance * 1000);
          this.uiText.innerText = `Etäisyys: ${distanceMm} mm`;
        }
      });
    </script>

    <a-scene webxr="requiredFeatures: local-floor" ar-measurement>
      <a-camera position="0 1.6 0">
        <a-cursor color="yellow" scale="0.5 0.5 0.5"></a-cursor>
      </a-camera>
    </a-scene>
  </body>
</html>
